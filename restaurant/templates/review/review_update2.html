{% extends "layout/base.html" %}
{% load static %}
{% block title %}nagoyameshi{% endblock %}
{% block content %}
<main>
  <div class="container nagoyameshi-container pb-5">
    <div class="row justify-content-center">
      <div class="col-xxl-6 col-xl-7 col-lg-8 col-md-10">
        <nav class="my-3" style="--bs-breadcrumb-divider: '>';" aria-label="breadcrumb">
          <ol class="breadcrumb mb-0">
            <li class="breadcrumb-item active" aria-current="page"><a href="{% url 'restaurant_list_2' restaurant.id %}">保有店舗一覧</a></li>
            <li class="breadcrumb-item active" aria-current="page"><a href="{% url 'review_list2' restaurant.id %}">レビュー一覧</a></li>
            <li class="breadcrumb-item active" aria-current="page">レビュー返信</li>
          </ol>
        </nav>
        <h1 class="mb-3 text-center">レビューの返信</h1>
        <h2 class="mb-3 text-center">【{{ restaurant.shop_name }}】</h2>
        <a href="{% url 'review_list2' restaurant.id %}">戻る</a>
        <br><br>
        <div class="card-body">
          <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary">更新</button>
            <a href="{% url 'review_list2' object.restaurant.id %}" class="btn btn-secondary">キャンセル</a>
          </form>
        </div>
      </div>
    </div>
  </main>
{% endblock %}
